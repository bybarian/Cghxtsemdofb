<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Handbook | 數位手冊</title>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        console.error('CRITICAL ERROR:', msg, url, line);
        var div = document.createElement('div');
        div.style.cssText = "position:fixed;top:0;left:0;width:100%;background:rgba(255,0,0,0.9);color:white;z-index:999999;padding:20px;font-size:12px;white-space:pre-wrap;font-family:monospace;";
        div.innerText = '系統載入失敗: ' + msg + '\n' + (error ? error.stack : '');
        document.body.appendChild(div);
      };
    </script>
  </head>
  <body class="bg-slate-50">
    <div id="root">
        <div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;font-family:sans-serif;">
            <div style="width:40px;height:40px;border:4px solid #f1f5f9;border-top:4px solid #00813c;border-radius:50%;animation:spin 1s linear infinite;"></div>
            <div style="color:#00813c;font-weight:700;letter-spacing:0.05em;">數位科技輔助臨床教練工作坊 載入中...</div>
            <style>
                @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
            </style>
        </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
